<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>URL Checker</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#FFF7C5;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:430px;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
    text-align:center;
}

h1{
    margin-bottom:10px;
    color:#222;
}

p{
    color:#666;
    margin-bottom:20px;
}

input[type="text"]{
    width:100%;
    padding:14px;
    border:2px solid #F4AE52;
    border-radius:8px;
    font-size:16px;
    outline:none;
}

button{
    width:100%;
    margin-top:15px;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#F4AE52;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

.result{
    margin-top:20px;
    padding:15px;
    border-radius:10px;
    font-size:18px;
    font-weight:bold;
}

.safe{
    background:#d4edda;
    color:#155724;
}

.warning{
    background:#fff3cd;
    color:#856404;
}

.danger{
    background:#f8d7da;
    color:#721c24;
}

</style>
</head>
<body>

<div class="container">

    <h1>URL Checker</h1>

    <p>Paste a URL and check its safety.</p>

    <form method="POST">

        <input
            type="text"
            name="url"
            placeholder="https://example.com"
            required>

        <button type="submit">
            Check URL
        </button>

    </form>

    {% if result %}
    <div class="result {{ status }}">
        {{ result }}
    </div>
    {% endif %}

</div>

</body>
</html>
